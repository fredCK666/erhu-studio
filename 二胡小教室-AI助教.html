<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>二胡小教室 | AI 二胡助教</title>
  <style>
    :root {
      --ink: #1f1713;
      --muted: #6b5d52;
      --wood: #7d4b2b;
      --paper: rgba(255, 250, 244, 0.96);
      --line: rgba(114, 75, 41, 0.08);
      --shadow: 0 24px 56px rgba(61, 39, 24, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255, 207, 92, 0.34), transparent 22%),
        radial-gradient(circle at 90% 12%, rgba(130, 157, 117, 0.18), transparent 20%),
        linear-gradient(180deg, #fff4dd 0%, #fffdfa 38%, #f3e6d9 100%);
    }

    a { color: inherit; text-decoration: none; }

    .shell {
      width: min(1380px, calc(100% - 24px));
      margin: 0 auto;
      padding: 24px 0 42px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
      flex-wrap: wrap;
      color: var(--muted);
      font-weight: 700;
    }

    .brand {
      color: var(--ink);
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 0.08em;
    }

    .nav {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    .chat-shell {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 32px;
      box-shadow: var(--shadow);
      min-height: calc(100vh - 120px);
      display: flex;
      flex-direction: column;
      padding: 28px;
      gap: 18px;
    }

    .chat-head h1 {
      margin: 0 0 8px;
      font-size: clamp(34px, 5vw, 52px);
    }

    .meta,
    .status {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.8;
    }

    .status {
      color: var(--wood);
      font-weight: 900;
    }

    .composer {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 12px;
      align-items: end;
    }

    .label {
      display: block;
      margin-bottom: 8px;
      color: var(--wood);
      font-size: 15px;
      font-weight: 900;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      border: 1px solid rgba(125, 75, 43, 0.14);
      border-radius: 22px;
      padding: 18px 20px;
      font: inherit;
      font-size: 18px;
      color: var(--ink);
      background: #fffdf9;
      outline: none;
      resize: vertical;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 156px;
      min-height: 58px;
      padding: 0 18px;
      border: 0;
      border-radius: 999px;
      font: inherit;
      font-weight: 900;
      cursor: pointer;
    }

    .button.primary {
      background: linear-gradient(135deg, #ffd66b, #e7861d);
      color: #4a2f18;
    }

    .button.secondary {
      background: rgba(125, 75, 43, 0.08);
      color: var(--wood);
    }

    .messages {
      flex: 1;
      min-height: 520px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 8px 4px 0;
    }

    .message {
      max-width: 92%;
      padding: 18px 20px;
      border-radius: 28px;
      white-space: pre-wrap;
      line-height: 1.85;
      box-shadow: 0 14px 32px rgba(62, 40, 24, 0.08);
      font-size: 18px;
    }

    .message.user {
      margin-left: auto;
      background: linear-gradient(135deg, #ffd66b, #ed9e2f);
      color: #422916;
      border-bottom-right-radius: 10px;
    }

    .message.assistant {
      background: linear-gradient(180deg, #fffaf2, #fff1df);
      border: 1px solid rgba(125, 75, 43, 0.08);
      border-bottom-left-radius: 10px;
    }

    .message small {
      display: block;
      margin-bottom: 8px;
      color: var(--wood);
      font-size: 14px;
      font-weight: 900;
      letter-spacing: 0.04em;
    }

    .resource-list {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .resource-card {
      width: min(320px, 100%);
      padding: 12px 14px;
      border-radius: 20px;
      background: rgba(125, 75, 43, 0.08);
      border: 1px solid rgba(125, 75, 43, 0.1);
    }

    .resource-card strong {
      display: block;
      margin-bottom: 6px;
      color: var(--wood);
    }

    .resource-card a {
      color: #4a2f18;
      font-weight: 800;
      text-decoration: underline;
    }

    .resource-preview {
      width: 100%;
      border: 0;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 10px;
      background: rgba(255, 255, 255, 0.7);
    }

    .resource-preview.image {
      aspect-ratio: 4 / 3;
      object-fit: cover;
      display: block;
    }

    .resource-preview.video {
      aspect-ratio: 16 / 9;
      display: block;
    }

    .empty {
      padding: 28px;
      border-radius: 24px;
      background: rgba(255, 246, 232, 0.9);
      border: 1px dashed rgba(125, 75, 43, 0.18);
      color: var(--muted);
      font-size: 18px;
      line-height: 1.9;
    }

    @media (max-width: 860px) {
      .composer {
        grid-template-columns: 1fr;
      }

      .button {
        width: 100%;
      }

      .chat-shell {
        padding: 20px;
        min-height: calc(100vh - 90px);
      }

      .message {
        max-width: 100%;
        font-size: 17px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand">二胡小教室</div>
      <nav class="nav">
        <a href="./erhu/">回首頁</a>
        <a href="./二胡小教室.html">課程分級</a>
        <a href="./二胡小教室-練習打卡.html">每週打卡</a>
      </nav>
    </header>

    <section class="chat-shell">
      <div class="chat-head">
        <h1>AI 二胡助教</h1>
        <div class="meta" id="contextMeta">正在準備目前學生的對話紀錄。</div>
        <div class="status" id="sourceStatus">目前來源：初始化中</div>
      </div>

      <div class="composer">
        <div>
          <label class="label" for="questionInput">要問什麼問題</label>
          <textarea id="questionInput" placeholder="例如：給我賽馬的二胡簡譜、給我賽馬的二胡教學影片、我的內外弦切換一直卡住怎麼練？"></textarea>
        </div>
        <button class="button primary" id="askButton" type="button">送出問題</button>
        <button class="button secondary" id="clearButton" type="button">清除聊天紀錄</button>
      </div>

      <div class="messages" id="messages"></div>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="./firebase-init.js?v=20260323b"></script>
  <script src="./auth.js?v=20260323b"></script>
  <script>
    window.ErhuAuth.requireAuth();
    window.ErhuAuth.attachAuthUI();

    const questionInput = document.getElementById("questionInput");
    const askButton = document.getElementById("askButton");
    const clearButton = document.getElementById("clearButton");
    const messages = document.getElementById("messages");
    const contextMeta = document.getElementById("contextMeta");
    const sourceStatus = document.getElementById("sourceStatus");

    let currentUser = null;
    let historyMessages = [];
    let learningProfile = null;

    function setSourceStatus(text) {
      sourceStatus.textContent = "目前來源：" + text;
    }

    function updateContextMeta() {
      const displayName = currentUser ? currentUser.displayName : "目前學生";
      contextMeta.textContent = displayName + "｜直接輸入你的問題即可";
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function buildPreviewSvg(text, variant) {
      const background = variant === "video" ? "#f3d6a5" : "#f6e6c9";
      const accent = variant === "video" ? "#8a4a1c" : "#7d4b2b";
      const svg = "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"800\" height=\"600\" viewBox=\"0 0 800 600\">" +
        "<rect width=\"800\" height=\"600\" rx=\"36\" fill=\"" + background + "\"/>" +
        "<circle cx=\"690\" cy=\"110\" r=\"72\" fill=\"#f7c361\" fill-opacity=\"0.75\"/>" +
        "<rect x=\"72\" y=\"110\" width=\"656\" height=\"380\" rx=\"28\" fill=\"#fff8ef\"/>" +
        "<text x=\"96\" y=\"188\" fill=\"" + accent + "\" font-size=\"42\" font-family=\"Noto Sans TC, sans-serif\" font-weight=\"700\">二胡小教室</text>" +
        "<text x=\"96\" y=\"280\" fill=\"#33231a\" font-size=\"56\" font-family=\"Noto Sans TC, sans-serif\" font-weight=\"800\">" + escapeHtml(text) + "</text>" +
        "<text x=\"96\" y=\"352\" fill=\"#6b5d52\" font-size=\"30\" font-family=\"Noto Sans TC, sans-serif\">點下方連結可看更多相關資源</text>" +
        "</svg>";
      return "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg);
    }

    function renderResource(resource) {
      let preview = "";
      if (resource.kind === "video" && resource.embedUrl) {
        preview = "<iframe class=\"resource-preview video\" src=\"" + escapeHtml(resource.embedUrl) + "\" title=\"" + escapeHtml(resource.title || "影片") + "\" allow=\"accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share\" allowfullscreen></iframe>";
      } else if (resource.kind === "image") {
        const imageSrc = resource.imageUrl || buildPreviewSvg(resource.previewText || resource.title || "二胡簡譜", "image");
        preview = "<img class=\"resource-preview image\" src=\"" + imageSrc + "\" alt=\"" + escapeHtml(resource.title || "圖片") + "\" />";
      } else if (resource.kind === "video-search") {
        const imageSrc = resource.thumbnailUrl || buildPreviewSvg(resource.previewText || resource.title || "二胡影片", "video");
        preview = "<img class=\"resource-preview image\" src=\"" + imageSrc + "\" alt=\"" + escapeHtml(resource.title || "影片") + "\" />";
      }
      return "<div class=\"resource-card\">" + preview + "<strong>" + escapeHtml(resource.label || "資源") + "</strong><a href=\"" + escapeHtml(resource.url || "#") + "\" target=\"_blank\" rel=\"noopener noreferrer\">" + escapeHtml(resource.title || "開啟") + "</a></div>";
    }

    function renderMessages() {
      if (!historyMessages.length) {
        messages.innerHTML = "<div class=\"empty\">直接輸入你要問的問題就可以。<br>例如：<br>1. 給我賽馬的二胡簡譜<br>2. 給我賽馬的二胡教學影片<br>3. 我的內外弦切換一直卡住怎麼練？</div>";
        return;
      }
      messages.innerHTML = historyMessages.map(function (item) {
        const author = item.role === "assistant" ? "AI 助教" : "你";
        const resourcesHtml = Array.isArray(item.resources) && item.resources.length
          ? "<div class=\"resource-list\">" + item.resources.map(function (resource) {
              return renderResource(resource);
            }).join("") + "</div>"
          : "";
        return "<div class=\"message " + item.role + "\"><small>" + author + "</small>" + escapeHtml(item.text) + resourcesHtml + "</div>";
      }).join("");
      messages.scrollTop = messages.scrollHeight;
    }

    async function loadLearningProfile() {
      if (!currentUser) return null;
      const studentRef = window.ErhuFirebase.db.collection("students").doc(currentUser.uid);
      const trackerSnapshot = await studentRef.collection("trackers").get();
      const quizSnapshot = await studentRef.collection("quizScores").get();
      const trackerSummary = {};
      trackerSnapshot.forEach(function (doc) {
        const data = doc.data() || {};
        const completedWeeks = Object.keys(data).filter(function (key) {
          return key.indexOf("week_") === 0 && data[key];
        }).length;
        trackerSummary[doc.id] = completedWeeks;
      });
      const quizSummary = {};
      quizSnapshot.forEach(function (doc) {
        const data = doc.data() || {};
        const match = doc.id.match(/^(beginner|intermediate|advanced)_week_(\d+)$/);
        if (!match) return;
        const levelKey = match[1];
        if (!quizSummary[levelKey]) {
          quizSummary[levelKey] = { best: 0, last: null, weakWeeks: [] };
        }
        if (typeof data.bestScore === "number" && data.bestScore > quizSummary[levelKey].best) {
          quizSummary[levelKey].best = data.bestScore;
        }
        if (typeof data.lastScore === "number") {
          quizSummary[levelKey].last = data.lastScore;
          if (data.lastScore < 8) {
            quizSummary[levelKey].weakWeeks.push("第 " + match[2] + " 週 " + data.lastScore + "/10");
          }
        }
      });
      return {
        displayName: currentUser.displayName,
        trackerSummary: trackerSummary,
        quizSummary: quizSummary
      };
    }

    function chatRef() {
      return window.ErhuFirebase.db.collection("students").doc(currentUser.uid).collection("aiChats").doc("main");
    }

    async function askBackendTutor(question) {
      if (!currentUser) {
        throw new Error("missing-user");
      }
      const payload = JSON.stringify({
        question: question,
        level: "beginner",
        week: 1,
        history: historyMessages,
        studentProfile: learningProfile
      });
      const urls = [window.ErhuFirebase.askTutorUrl, window.ErhuFirebase.askTutorFallbackUrl].filter(Boolean);
      let lastError = null;
      for (let index = 0; index < urls.length; index += 1) {
        try {
          const response = await fetch(urls[index], {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: payload
          });
          const data = await response.json();
          if (!response.ok || !data.answer) {
            throw new Error(data && data.error ? data.error : "backend-failed");
          }
          setSourceStatus("OpenAI 後端");
          return {
            text: data.answer,
            resources: Array.isArray(data.resources) ? data.resources : []
          };
        } catch (error) {
          lastError = error;
        }
      }
      throw lastError || new Error("backend-failed");
    }

    async function saveHistory() {
      const trimmed = historyMessages.slice(-24);
      await chatRef().set({
        messages: trimmed,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      }, { merge: true });
    }

    async function loadHistory() {
      const snapshot = await chatRef().get();
      const saved = snapshot.exists && Array.isArray(snapshot.data().messages) ? snapshot.data().messages : [];
      historyMessages = saved;
      renderMessages();
    }

    async function addMessage(role, text, resources) {
      historyMessages.push({
        role: role,
        text: text,
        resources: resources || [],
        createdAt: new Date().toISOString()
      });
      renderMessages();
      await saveHistory();
    }

    function buildAnswer(question) {
      if (/簡譜|樂譜|譜|圖片|影片|youtube|video/i.test(question)) {
        return "我先幫你整理和這個問題直接相關的圖片或影片資源，你可以看下方顯示的內容。";
      }
      return "我先直接回答你的問題。如果你想要，我也可以再幫你拆成更短的練習步驟。";
    }

    async function submitQuestion() {
      const question = questionInput.value.trim();
      if (!question || !currentUser) return;
      askButton.disabled = true;
      askButton.textContent = "回覆中...";
      try {
        await addMessage("user", question);
        let answer = null;
        try {
          answer = await askBackendTutor(question);
        } catch (error) {
          console.error("askBackendTutor failed, fallback to local tutor", error);
          setSourceStatus("本地備援（" + (error && error.message ? error.message : "unknown-error") + "）");
          answer = { text: buildAnswer(question), resources: [] };
        }
        await addMessage("assistant", answer.text, answer.resources);
        questionInput.value = "";
      } finally {
        askButton.disabled = false;
        askButton.textContent = "送出問題";
      }
    }

    async function clearHistory() {
      if (!currentUser) return;
      historyMessages = [];
      renderMessages();
      await chatRef().set({
        messages: [],
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      }, { merge: true });
    }

    askButton.addEventListener("click", submitQuestion);
    clearButton.addEventListener("click", clearHistory);
    questionInput.addEventListener("keydown", function (event) {
      if ((event.metaKey || event.ctrlKey) && event.key === "Enter") {
        submitQuestion();
      }
    });

    updateContextMeta();
    setSourceStatus("等待送出問題");

    window.ErhuAuth.onReady(async function (user) {
      currentUser = user;
      updateContextMeta();
      learningProfile = await loadLearningProfile();
      await loadHistory();
    });
  </script>
</body>
</html>
