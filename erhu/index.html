<!DOCTYPE html>
<html lang="zh-Hant">
<head>

    }

    .card {

      padding: 28px;
      border-radius: 28px;
      background: rgba(255, 251, 245, 0.96);
      border: 1px solid rgba(125, 75, 43, 0.1);
      box-shadow: 0 24px 48px rgba(73, 44, 23, 0.12);
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 34px;
    }

    p {
      margin: 0;
      color: #6f5c50;
      line-height: 1.8;
      font-size: 18px;
    }

    a {
      display: inline-block;
      margin-top: 18px;
      color: #7d4b2b;
      font-weight: 900;
      text-decoration: underline;

</head>
