<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>二胡小教室 | 每週學習測驗</title>
  <style>
    :root { --ink:#211914; --muted:#69584d; --paper:rgba(255,250,244,0.92); --line:rgba(83,57,39,0.12); --wood:#7b4d2d; --shadow:0 22px 54px rgba(46,28,18,0.14); }
    * { box-sizing:border-box; }
    body { margin:0; color:var(--ink); font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif; background:linear-gradient(180deg,#f7efe3 0%,#fbf9f5 40%,#efe4d5 100%); }
    a { color:inherit; text-decoration:none; }
    .shell { width:min(1120px,calc(100% - 28px)); margin:0 auto; padding:24px 0 40px; }
    .topbar { display:flex; justify-content:space-between; gap:16px; margin-bottom:18px; flex-wrap:wrap; }
    .brand { font-size:22px; font-weight:800; letter-spacing:0.08em; }
    .nav { display:flex; gap:14px; flex-wrap:wrap; color:var(--muted); font-weight:700; }
    .hero,.panel { background:var(--paper); border:1px solid var(--line); border-radius:28px; box-shadow:var(--shadow); }
    .hero { padding:28px; margin-bottom:18px; }
    h1 { margin:0 0 10px; font-size:clamp(30px,5vw,46px); }
    .hero p,.panel p { color:var(--muted); line-height:1.8; }
    .tabs,.week-tabs { display:flex; gap:12px; flex-wrap:wrap; margin-top:18px; }
    .tab,.week-tab { padding:12px 18px; border-radius:999px; border:1px solid var(--line); background:#fffdf8; color:var(--wood); font-size:18px; font-weight:800; cursor:pointer; }
    .week-tab { font-size:16px; padding:10px 14px; }
    .tab.active,.week-tab.active { background:linear-gradient(135deg,#efc06f,#ca8531); color:#4d2f15; border-color:transparent; }
    .quiz-grid { display:grid; gap:14px; }
    .question { padding:18px; border-radius:20px; border:1px solid var(--line); background:#fffdf8; }
    .question.correct { border-color:rgba(105,161,84,0.5); background:rgba(240,251,235,0.92); }
    .question.incorrect { border-color:rgba(204,107,77,0.4); background:rgba(255,244,240,0.96); }
    .options { display:grid; gap:10px; margin-top:12px; }
    .option { display:flex; gap:10px; align-items:start; padding:12px 14px; border-radius:14px; border:1px solid var(--line); background:rgba(255,255,255,0.78); }
    .meta { margin:18px 0 22px; padding:16px 18px; border-radius:18px; background:rgba(123,77,45,0.08); color:var(--muted); }
    .score-history { margin:0 0 18px; padding:14px 16px; border-radius:18px; background:rgba(123,77,45,0.08); color:var(--wood); font-weight:800; }
    .feedback { margin-top:12px; font-weight:800; }
    .feedback.correct { color:#4f7d35; }
    .feedback.incorrect { color:#ba5d3c; }
    .controls { display:flex; gap:12px; flex-wrap:wrap; margin-top:16px; }
    .button { display:inline-flex; align-items:center; justify-content:center; padding:12px 16px; border:0; border-radius:999px; background:linear-gradient(135deg,#efc06f,#ca8531); color:#4d2f15; font-weight:800; cursor:pointer; }
    .button.secondary { background:rgba(123,77,45,0.1); color:var(--wood); }
    .result { margin-top:14px; color:var(--wood); font-weight:800; }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand">二胡小教室</div>
      <nav class="nav">
        <a href="./">回首頁</a>
        <a href="./二胡小教室.html">課程入口</a>
        <a href="./二胡小教室-章節.html">章節教學</a>
        <a href="./二胡小教室-影片.html">影片音檔</a>
        <a href="./二胡小教室-練習打卡.html">練習打卡</a>
      </nav>
    </header>
    <section class="hero">
      <h1 id="pageTitle">每週學習測驗</h1>
      <p id="quizIntro">每個等級的每一週都有獨立 10 題，學生練完當週內容後，可以直接做該週測驗確認自己有沒有吸收。</p>
      <div class="tabs" id="levelTabs"></div>
      <div class="week-tabs" id="weekTabs"></div>
    </section>
    <section class="panel" style="padding:24px;">
      <div class="meta" id="quizMeta"></div>
      <div class="score-history" id="scoreHistory">尚未留下測驗紀錄</div>
      <div class="quiz-grid" id="quizContainer"></div>
      <div class="controls">
        <button class="button" id="submitQuizButton" type="button">送出測驗</button>
        <button class="button secondary" id="resetQuizButton" type="button">重新作答</button>
      </div>
      <div class="result" id="quizResult">尚未作答</div>
    </section>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="./firebase-init.js?v=20260323b"></script>
  <script src="./auth.js?v=20260323b"></script>
  <script>
    window.ErhuAuth.requireAuth();
    window.ErhuAuth.attachAuthUI();
    const weeklyData = {
      beginner: {
        label: "初級",
        weeks: [
          { title: "第 1 週：姿勢與持琴重整", description: "重整坐姿、琴筒位置、握弓與身體放鬆感。", focus: ["先把持琴與握弓位置放正。", "觀察肩膀是否放鬆。", "用鏡子檢查身體角度。"], tasks: ["完成 5 次姿勢檢查。", "錄 30 秒持琴姿勢影片。", "確認右手握弓不僵硬。"], note: "初級第 1 週以空弦與姿勢節奏為主。" },
          { title: "第 2 週：基本長弓穩定", description: "練長弓平均、弓速控制與音色乾淨度。", focus: ["每個長弓要拉滿。", "控制弓速平均。", "避免音頭太重。"], tasks: ["每天做 8 組長弓。", "錄一段長音回聽。", "穩定維持 4 拍長音。"], note: "先求穩，不求快。" },
          { title: "第 3 週：內外弦切換", description: "建立切弦手感，讓弓路乾淨不混亂。", focus: ["切弦動作要小。", "手肘轉換不要甩。", "保持聲音連續。"], tasks: ["完成 4 組切弦循環。", "配拍器做慢速切換。", "回聽是否有雜音。"], note: "這週主角是弓路與切弦準確。" },
          { title: "第 4 週：節奏與短句", description: "用拍器把短句拉穩，建立拍點概念。", focus: ["句子先拆短。", "拍點要穩。", "短句收尾乾淨。"], tasks: ["拍器下完成 8 小節。", "每句至少重複 3 次。", "避免中途停頓。"], note: "先把短句完整，不急著拉長段落。" },
          { title: "第 5 週：左手按音基礎", description: "加入按音和簡單音階，開始建立音準感。", focus: ["手指落點要穩。", "每個音都先聽準。", "按音後肩膀仍放鬆。"], tasks: ["完成上下行音階 4 次。", "記錄最不穩的兩個音。", "練完回聽音準。"], note: "開始進入左手訓練。" },
          { title: "第 6 週：音階反覆校正", description: "反覆修正落點，讓耳朵和手指對齊。", focus: ["同一個音反覆確認。", "先少量音再加長。", "偏音要做記號。"], tasks: ["每天做 2 輪音階校正。", "錄音回聽 1 次。", "標出偏高偏低位置。"], note: "重點是重複，不是求新。" },
          { title: "第 7 週：分弓與連弓", description: "把常見弓法放進簡單樂句中練習。", focus: ["分弓要清楚。", "連弓要順。", "句子不要斷掉。"], tasks: ["同一句做分弓版與連弓版。", "比較音色差異。", "完整錄一段。"], note: "弓法開始進入句子。" },
          { title: "第 8 週：基礎旋律整合", description: "開始把姿勢、節奏和音準放進旋律。", focus: ["保持完整旋律感。", "音準與節奏同時顧。", "不要只顧單點。"], tasks: ["完成一段短旋律。", "中途不停下。", "錄音回看流暢度。"], note: "第一次進入完整旋律練習。" },
          { title: "第 9 週：完整段落演奏", description: "連續拉完一段短曲，不中斷完成。", focus: ["演奏不能中斷。", "先求完整。", "錯音先做記號。"], tasks: ["完整拉完一段。", "記錄卡住的位置。", "第二次再修正。"], note: "這週要開始像表演，而不是片段練習。" },
          { title: "第 10 週：初級成果驗收", description: "錄下一段完整基礎演奏，作為初級收尾。", focus: ["從頭到尾完成。", "維持姿勢與穩定。", "留下成果版本。"], tasks: ["錄一支完整版本。", "聽一次並寫 3 個心得。", "準備進入中級。"], note: "這一週的譜可以直接換成你的成果曲譜。" }
        ]
      },
      intermediate: {
        label: "中級",
        weeks: [
          { title: "第 1 週：換把定位重整", description: "重新整理換把的目標音與手位移動。", focus: ["換把前先想目標音。", "動作要短。", "保持音準。"], tasks: ["做 10 次目標換把。", "錄 1 段換把片段。", "標記常偏的位置。"], note: "中級譜例著重換把定位。" },
          { title: "第 2 週：揉弦穩定起步", description: "建立小幅度、可控制的揉弦動作。", focus: ["揉弦先小。", "不要掉音。", "配合長音。"], tasks: ["4 個長音揉弦。", "比較有無揉弦差異。", "回聽音準是否穩。"], note: "~~~ 表示持續揉弦。" },
          { title: "第 3 週：音色控制訓練", description: "練習不同力度和接觸位置造成的音色差異。", focus: ["同一句做強弱變化。", "拉出層次。", "保持乾淨音色。"], tasks: ["完成一組強弱對比。", "錄音比較前後。", "維持穩定弓速。"], note: "中級開始要加入力度設計。" },
          { title: "第 4 週：弓法組合進階", description: "把分弓、連弓、重音放進更長的句子。", focus: ["重音要有位置。", "弓法切換要順。", "句子不中斷。"], tasks: ["同句做兩種弓法。", "拍器下完成。", "記錄最難一格。"], note: "這週重點是弓法切換與句子連續。" },
          { title: "第 5 週：中速節奏穩定", description: "從慢速跨到中速，保持節奏與音準不散。", focus: ["拍速逐步增加。", "亂掉就退回。", "不要硬追速度。"], tasks: ["至少提升兩段拍速。", "每段都完整拉對。", "保持放鬆。"], note: "逐步加速，不一次跳太快。" },
          { title: "第 6 週：段落與換氣感", description: "讓演奏不只正確，也開始有句子方向。", focus: ["設計句子高低。", "收尾清楚。", "有呼吸感。"], tasks: ["畫出句子段落。", "完整拉 2 次。", "回聽是否有層次。"], note: "把句子切出結構感。" },
          { title: "第 7 週：耐力與不中斷演奏", description: "提升中段演奏耐力與注意力維持。", focus: ["演奏長段落。", "錯音不立刻停。", "保持節奏。"], tasks: ["連續拉 16 小節。", "標記問題點。", "第二輪修正。"], note: "耐力比短句更重要。" },
          { title: "第 8 週：速度提升訓練", description: "逐步提高拍速，維持乾淨與穩定。", focus: ["速度上升仍乾淨。", "手不能緊。", "句子要完整。"], tasks: ["每次加 4 bpm。", "完成 3 段速度。", "回聽是否變亂。"], note: "速度上來更要放鬆。" },
          { title: "第 9 週：技巧整合到曲目", description: "把換把、揉弦、弓法整合進完整段落。", focus: ["技巧為曲子服務。", "不要只顧招式。", "段落表現一致。"], tasks: ["挑一段曲目整合。", "錄影回看。", "寫下 3 個修正點。"], note: "把技巧真的放回曲子裡。" },
          { title: "第 10 週：中級成果錄影", description: "完成一段具有表情和完整段落感的演奏。", focus: ["保有表情。", "完成整段。", "錄成成果版本。"], tasks: ["錄一支中級成果。", "回看姿勢與音色。", "準備進入高級。"], note: "成果曲譜可之後替換成正式版本。" }
        ]
      },
      advanced: {
        label: "高級",
        weeks: [
          { title: "第 1 週：高強度長弓控制", description: "重新提升弓速、弓壓與音色統一性。", focus: ["高強度仍要穩。", "音色統一。", "不要因為用力而緊。"], tasks: ["完成高強度長弓 8 組。", "錄 1 段高低強弱對比。", "回聽音色均勻度。"], note: "高級先從控制力回頭校正。" },
          { title: "第 2 週：快速換把與定位", description: "處理高速度下的手位準確與穩定。", focus: ["高速度目標更準。", "手位移動短。", "聲音不能糊。"], tasks: ["做快速換把 12 次。", "拍器提速測試。", "記錄不穩位置。"], note: "高級換把要快又準。" },
          { title: "第 3 週：複合弓法連接", description: "把複雜弓法放在高難度片段中完成。", focus: ["複合弓法順接。", "重音位置清楚。", "整段不散。"], tasks: ["慢速拆解。", "回到原速。", "完成一段錄音。"], note: "高級弓法重點是連接與乾淨。" },
          { title: "第 4 週：揉弦與表情深化", description: "精修不同速度、不同情緒的揉弦效果。", focus: ["揉弦速度有變化。", "符合樂句情緒。", "不犧牲音準。"], tasks: ["同句做兩種表情。", "錄音比較。", "選最適合版本。"], note: "揉弦開始服務於表情。" },
          { title: "第 5 週：高速度節奏穩定", description: "在更高拍速下維持乾淨、準確與放鬆。", focus: ["高拍速不能亂。", "動作要更小。", "節奏更精確。"], tasks: ["逐步加速。", "維持乾淨音色。", "完成 3 次原速。"], note: "這週的譜更接近高難度片段。" },
          { title: "第 6 週：段落推進與層次", description: "設計樂句起伏、呼吸感和結構感。", focus: ["分層次演奏。", "有推進方向。", "收尾清楚。"], tasks: ["標出起承轉合。", "完整拉一次。", "寫下段落設計。"], note: "高級要開始設計整段敘事。" },
          { title: "第 7 週：困難段拆解修正", description: "鎖定最難片段，做精準拆解練習。", focus: ["找最難的 2 小節。", "拆出節奏、弓法、指法。", "再組回原段。"], tasks: ["列出困難段。", "拆練 3 輪。", "回到整段測試。"], note: "這週是修正週，不是拼命往下練。" },
          { title: "第 8 週：整首曲目連續演奏", description: "訓練從頭到尾不中斷完成曲目。", focus: ["完整演奏。", "不中斷。", "保持專注。"], tasks: ["至少完成兩次整首。", "第一次不修，第二次修。", "記錄失誤點。"], note: "練的是完整度。" },
          { title: "第 9 週：錄影回看與舞台修正", description: "用錄影檢查音色、動作與舞台完整度。", focus: ["不只聽，也要看。", "修動作與表情。", "調整舞台感。"], tasks: ["錄影 1 次。", "回看並寫 3 個問題。", "做第二次修正版。"], note: "錄影是高級課程的必備工具。" },
          { title: "第 10 週：高級總驗收", description: "完成正式版本錄影，作為高級課程成果輸出。", focus: ["像正式演出一樣。", "從頭到尾完成。", "留下最終版本。"], tasks: ["錄正式版。", "回看完整度。", "保留成果檔案。"], note: "最後可直接換成你的正式演出曲譜。" }
        ]
      }
    };

    const distractors = {
      goal: ["追求更快速度", "直接跳到下一週", "只求音量變大"],
      focus: ["完全忽略身體放鬆", "只看手不聽聲音", "遇到問題立刻停掉"],
      task: ["直接跳過練習記錄", "只做一次就結束", "不回聽也不檢查"],
      note: ["這週重點是趕進度", "這週只要多練時間", "這週先不管穩定度"]
    };

    let params = new URLSearchParams(window.location.search);
    let currentLevel = params.get("level") || "beginner";
    let currentWeek = Math.min(10, Math.max(1, Number(params.get("week") || "1")));
    if (!weeklyData[currentLevel]) currentLevel = "beginner";

    const pageTitle = document.getElementById("pageTitle");
    const quizIntro = document.getElementById("quizIntro");
    const quizMeta = document.getElementById("quizMeta");
    const scoreHistory = document.getElementById("scoreHistory");
    const quizContainer = document.getElementById("quizContainer");
    const quizResult = document.getElementById("quizResult");
    const levelTabs = document.getElementById("levelTabs");
    const weekTabs = document.getElementById("weekTabs");

    function buildQuestion(id, question, correct, wrong1, wrong2, explanation) {
      return { id, question, options: [correct, wrong1, wrong2], answer: 0, explanation };
    }

    function buildWeekQuiz(levelKey, weekIndex) {
      const course = weeklyData[levelKey];
      const week = course.weeks[weekIndex];
      const weekNo = weekIndex + 1;
      return [
        buildQuestion("q1", "這一週的主題是什麼？", week.title.replace("第 " + weekNo + " 週：", "").trim(), course.weeks[(weekIndex + 1) % 10].title.replace(/^第 \d+ 週：/, "").trim(), course.weeks[(weekIndex + 2) % 10].title.replace(/^第 \d+ 週：/, "").trim(), "這份測驗對應的是 " + week.title + "。"),
        buildQuestion("q2", "這一週主要在處理哪一個學習方向？", week.description, course.weeks[(weekIndex + 3) % 10].description, course.weeks[(weekIndex + 4) % 10].description, "先抓準這週的主要學習方向，再進入細部練習。"),
        buildQuestion("q3", "本週教學重點之一是什麼？", week.focus[0], distractors.focus[0], distractors.focus[1], "本週第一個重點就是這一項。"),
        buildQuestion("q4", "本週第二個要注意的重點是什麼？", week.focus[1], distractors.focus[1], distractors.focus[2], "第二個教學重點要一起顧，不能只顧第一點。"),
        buildQuestion("q5", "本週第三個練習提醒是什麼？", week.focus[2], distractors.focus[2], distractors.focus[0], "第三個重點通常是把動作和聲音收得更完整。"),
        buildQuestion("q6", "下列哪一個是本週任務？", week.tasks[0], distractors.task[0], distractors.task[1], "這是本週任務安排之一。"),
        buildQuestion("q7", "學生本週還需要完成哪一項任務？", week.tasks[1], distractors.task[1], distractors.task[2], "這項任務是讓學生回看自己實際狀況。"),
        buildQuestion("q8", "本週最後還要完成什麼練習？", week.tasks[2], distractors.task[2], distractors.task[0], "第三個任務通常是收尾與自我檢查。"),
        buildQuestion("q9", "依照這週備註，最符合的練習提醒是什麼？", week.note, distractors.note[0], distractors.note[1], "備註是在提醒學生這週真正的主軸。"),
        buildQuestion("q10", course.label + "第 " + weekNo + " 週練完後，最應該先確認什麼？", "自己是否掌握了這週的重點、任務和練習方向", distractors.goal[0], distractors.goal[1], "這份測驗的目的，就是確認學生有沒有吸收到當週內容。")
      ];
    }

    function updateUrl() {
      history.replaceState(null, "", "./二胡小教室-小測驗.html?level=" + currentLevel + "&week=" + currentWeek);
    }

    function scoreRef() {
      const user = window.ErhuAuth.getCurrentUser();
      return window.ErhuFirebase.db.collection("students").doc(user.uid).collection("quizScores").doc(currentLevel + "_week_" + currentWeek);
    }

    async function renderScoreHistory() {
      const user = window.ErhuAuth.getCurrentUser() || "目前學生";
      const snapshot = await scoreRef().get();
      if (!snapshot.exists) {
        scoreHistory.textContent = user + "｜尚未留下這一週的測驗紀錄";
        return;
      }
      const saved = snapshot.data();
      scoreHistory.textContent = user + "｜上次分數：" + saved.lastScore + " / " + saved.total + "｜最佳分數：" + saved.bestScore + " / " + saved.total;
    }

    function renderLevelTabs() {
      levelTabs.innerHTML = "";
      Object.entries(weeklyData).forEach(([key, value]) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "tab";
        button.textContent = value.label;
        button.addEventListener("click", () => {
          currentLevel = key;
          renderQuiz();
        });
        levelTabs.appendChild(button);
      });
    }

    function renderWeekTabs() {
      weekTabs.innerHTML = "";
      for (let week = 1; week <= 10; week += 1) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "week-tab";
        button.textContent = "第 " + week + " 週";
        button.addEventListener("click", () => {
          currentWeek = week;
          renderQuiz();
        });
        weekTabs.appendChild(button);
      }
    }

    async function renderQuiz() {
      const course = weeklyData[currentLevel];
      const weekData = course.weeks[currentWeek - 1];
      const questions = buildWeekQuiz(currentLevel, currentWeek - 1);
      document.title = "二胡小教室 | " + course.label + "第 " + currentWeek + " 週測驗";
      pageTitle.textContent = course.label + "第 " + currentWeek + " 週學習測驗";
      quizIntro.textContent = "這一份是 " + course.label + "第 " + currentWeek + " 週的 10 題測驗，題目直接對應本週的學習主題、重點與任務。";
      quizMeta.textContent = weekData.title + "｜" + weekData.description;
      updateUrl();
      await renderScoreHistory();
      document.querySelectorAll(".tab").forEach((tab, index) => {
        const key = Object.keys(weeklyData)[index];
        tab.classList.toggle("active", key === currentLevel);
      });
      document.querySelectorAll(".week-tab").forEach((tab, index) => {
        tab.classList.toggle("active", index + 1 === currentWeek);
      });
      quizContainer.innerHTML = "";
      quizResult.textContent = "尚未作答";
      questions.forEach((item, index) => {
        const wrapper = document.createElement("div");
        wrapper.className = "question";
        wrapper.dataset.questionId = item.id;
        wrapper.innerHTML = "<p><strong>第 " + (index + 1) + " 題</strong><br>" + item.question + "</p>";
        const options = document.createElement("div");
        options.className = "options";
        item.options.forEach((option, optionIndex) => {
          const label = document.createElement("label");
          label.className = "option";
          label.innerHTML = "<input type=\"radio\" name=\"" + item.id + "\" value=\"" + optionIndex + "\"><span>" + option + "</span>";
          options.appendChild(label);
        });
        wrapper.appendChild(options);
        const feedback = document.createElement("div");
        feedback.className = "feedback";
        wrapper.appendChild(feedback);
        quizContainer.appendChild(wrapper);
      });
      window.currentQuestions = questions;
    }

    document.getElementById("submitQuizButton").addEventListener("click", async () => {
      let score = 0;
      let answered = 0;
      window.currentQuestions.forEach((item) => {
        const checked = document.querySelector("input[name=\"" + item.id + "\"]:checked");
        const questionCard = document.querySelector("[data-question-id=\"" + item.id + "\"]");
        const feedback = questionCard.querySelector(".feedback");
        questionCard.classList.remove("correct", "incorrect");
        feedback.textContent = "";
        feedback.className = "feedback";
        if (checked) {
          answered += 1;
          if (Number(checked.value) === item.answer) {
            score += 1;
            questionCard.classList.add("correct");
            feedback.classList.add("correct");
            feedback.textContent = "答對了：" + item.explanation;
          } else {
            questionCard.classList.add("incorrect");
            feedback.classList.add("incorrect");
            feedback.textContent = "答錯了：" + item.explanation;
          }
        }
      });
      if (answered < window.currentQuestions.length) {
        quizResult.textContent = "你還有題目沒作答，先全部選完再送出。";
        return;
      }
      const previousSnapshot = await scoreRef().get();
      const previous = previousSnapshot.exists ? previousSnapshot.data() : null;
      const bestScore = previous ? Math.max(previous.bestScore, score) : score;
      await scoreRef().set({
        level: currentLevel,
        week: currentWeek,
        lastScore: score,
        bestScore: bestScore,
        total: window.currentQuestions.length,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      }, { merge: true });
      await renderScoreHistory();
      quizResult.textContent = "你的分數是 " + score + " / " + window.currentQuestions.length + "。"
        + (score === window.currentQuestions.length ? " 全對，這一週重點已掌握。" : " 建議回去複習這一週內容，再做一次。");
    });

    document.getElementById("resetQuizButton").addEventListener("click", () => {
      document.querySelectorAll("input[type=\"radio\"]").forEach((input) => { input.checked = false; });
      document.querySelectorAll(".question").forEach((question) => question.classList.remove("correct", "incorrect"));
      document.querySelectorAll(".feedback").forEach((feedback) => {
        feedback.textContent = "";
        feedback.className = "feedback";
      });
      quizResult.textContent = "尚未作答";
    });

    window.ErhuAuth.onReady(function () {
      renderLevelTabs();
      renderWeekTabs();
      renderQuiz();
    });
  </script>
  </main>
</body>
</html>
